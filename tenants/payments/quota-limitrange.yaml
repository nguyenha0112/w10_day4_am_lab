apiVersion: v1
kind: ResourceQuota
metadata:
  name: payments-quota
  namespace: payments
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    pods: "10"
    services: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: payments-default-limits
  namespace: payments
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: 50m
      memory: 64Mi
    default:
      cpu: 200m
      memory: 256Mi
    max:
      cpu: 500m
      memory: 512Mi
