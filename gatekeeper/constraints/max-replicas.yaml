apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sMaxReplicas
metadata:
  name: max-replicas-five
spec:
  enforcementAction: deny
  match:
    excludedNamespaces: ["argocd", "gatekeeper-system", "kube-system", "monitoring"]
    kinds:
    - apiGroups: ["apps"]
      kinds: ["Deployment"]
    - apiGroups: ["argoproj.io"]
      kinds: ["Rollout"]
  parameters:
    max: 5
