apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8smaxreplicas
spec:
  crd:
    spec:
      names:
        kind: K8sMaxReplicas
      validation:
        openAPIV3Schema:
          type: object
          properties:
            max:
              type: integer
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8smaxreplicas

      max_replicas := input.parameters.max

      violation[{"msg": msg}] {
        replicas := input.review.object.spec.replicas
        replicas > max_replicas
        msg := sprintf("%s %q requests %v replicas; maximum allowed is %v", [
          input.review.object.kind,
          input.review.object.metadata.name,
          replicas,
          max_replicas,
        ])
      }
