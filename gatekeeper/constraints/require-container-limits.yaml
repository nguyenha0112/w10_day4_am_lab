apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredContainerLimits
metadata:
  name: require-container-limits
spec:
  enforcementAction: deny
  match:
    excludedNamespaces: ["argocd", "argo-rollouts", "cosign-system", "external-secrets", "gatekeeper-system", "kube-system", "monitoring"]
    kinds:
    - apiGroups: [""]
      kinds: ["Pod"]
